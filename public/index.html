<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      href="./favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon/favicon.svg" />
    <link rel="shortcut icon" href="./favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./favicon/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="WordBook" />
    <link rel="manifest" href="./favicon/site_en.webmanifest" />

    <!-- Metadatos para instalar la PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <meta
      name="description"
      content="Un vocabulario personal de español para guardar palabras nuevas hasta recordarlas."
    />
    <meta name="theme-color" content="#f7fbf8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#101411" media="(prefers-color-scheme: dark)" />
    <title>WordBook | Práctica de español</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/script.js" defer></script>
  </head>

  <body>
    <main class="app-shell">
      <header class="top-bar">
        <strong>WordBook</strong>
        <span><span id="total-count">0</span> palabras</span>
      </header>

      <section class="list-band" aria-label="Palabras por recordar">
        <ul class="word-list" id="word-list"></ul>

        <div class="empty-state" id="empty-state">
          <p>Todavía no hay palabras guardadas.</p>
          <span>Añade la próxima palabra en español que quieras guardar.</span>
        </div>
      </section>

      <dialog class="word-dialog" id="word-dialog" aria-labelledby="dialog-title">
        <div class="dialog-header">
          <h2 id="dialog-title">Añadir palabra</h2>
          <button class="close-dialog" id="close-dialog" type="button" aria-label="Cerrar formulario para añadir palabra">
            Cerrar
          </button>
        </div>

        <form class="word-form" id="word-form" autocomplete="off">
          <div class="field-row">
            <label for="spanish-word">Palabra</label>
            <input
              id="spanish-word"
              name="spanish-word"
              type="text"
              placeholder="Hola"
              required
            />
          </div>

          <div class="field-row">
            <label for="word-meaning">Significado</label>
            <input
              id="word-meaning"
              name="word-meaning"
              type="text"
              placeholder="Saludo"
              required
            />
          </div>

          <div class="field-row field-row-wide">
            <label for="word-note">Nota</label>
            <textarea
              id="word-note"
              name="word-note"
              rows="2"
              placeholder="Hola, ¿cómo estás?"
            ></textarea>
          </div>

          <button type="submit">Añadir palabra</button>
          <p class="form-message" id="form-message" role="status" aria-live="polite"></p>
        </form>
      </dialog>

      <nav class="view-footer" aria-label="Vistas de palabras">
        <button class="add-toggle" id="add-word-toggle" type="button">
          Añadir palabra
        </button>
        <button class="view-toggle" id="remembered-toggle" type="button">
          Palabras recordadas
        </button>
      </nav>
    </main>
  </body>
</html>
